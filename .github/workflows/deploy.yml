name: Deploy to Synology NAS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to NAS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.NAS_HOST }}
          username: ${{ secrets.NAS_USERNAME }}
          key: ${{ secrets.NAS_SSH_KEY }}
          port: ${{ secrets.NAS_PORT }}
          script: |
            cd ~/docker/RecommandStock
            echo "📁 현재 디렉토리: $(pwd)"
            echo "🔍 Git 상태 확인..."
            git status

            echo "📡 Git remote 목록:"
            git remote -v

            echo "🔧 origin을 HTTPS로 설정..."
            git remote set-url origin https://github.com/leevelop-up/RecommandStock.git

            echo "🔄 최신 코드 가져오기..."
            git fetch origin
            git reset --hard origin/main
            git clean -fd

            echo "📝 현재 커밋:"
            git log -1 --oneline

            echo "🔍 주요 소스 파일 확인:"
            echo "- HomePage.tsx:"
            head -30 src/app/pages/HomePage.tsx | grep -A 5 "hotThemes"
            echo "- nginx.conf:"
            grep -A 3 "Cache-Control" nginx.conf
            echo "- docker-compose.yml:"
            grep -A 2 "recommand-network" docker-compose.yml

            echo "🐳 Docker 컨테이너 및 이미지 정리..."
            # 모든 recommandstock 관련 컨테이너 강제 정리 (옛날 컨테이너 포함)
            /usr/local/bin/docker ps -a | grep recommandstock | awk '{print $1}' | xargs -r /usr/local/bin/docker rm -f || true
            /usr/local/bin/docker-compose down --rmi all --volumes

            echo "🔨 Docker 이미지 재빌드 (캐시 없이)..."
            /usr/local/bin/docker-compose build --no-cache --pull

            echo "🚀 Docker 컨테이너 시작..."
            /usr/local/bin/docker-compose up -d --force-recreate

            echo "⏳ 컨테이너 시작 대기 중..."
            sleep 5

            echo "📊 Docker 컨테이너 상태:"
            /usr/local/bin/docker ps -a | grep recommandstock

            echo "📋 Docker 컨테이너 로그 (마지막 20줄):"
            /usr/local/bin/docker logs --tail 20 recommandstock-frontend

            echo "🔍 실제 배포된 파일 확인:"
            /usr/local/bin/docker exec recommandstock-frontend ls -lh /usr/share/nginx/html/assets/ | grep index

            echo "✅ 자동 배포 완료!"
            echo "🔗 배포 URL: http://leevelop.com:3000"
