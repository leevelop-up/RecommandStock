name: Deploy to Synology NAS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to NAS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.NAS_HOST }}
          username: ${{ secrets.NAS_USERNAME }}
          key: ${{ secrets.NAS_SSH_KEY }}
          port: ${{ secrets.NAS_PORT }}
          script: |
            cd ~/docker/RecommandStock
            echo "📁 현재 디렉토리: $(pwd)"
            echo "🔍 Git 상태 확인..."
            git status

            echo "📡 Git remote 목록:"
            git remote -v

            echo "🔧 origin을 HTTPS로 설정..."
            git remote set-url origin https://github.com/leevelop-up/RecommandStock.git

            echo "🔄 최신 코드 가져오기..."
            git fetch origin
            git reset --hard origin/main
            git clean -fd

            echo "📝 현재 커밋:"
            git log -1 --oneline

            echo "🐳 Docker 컨테이너 및 이미지 정리..."
            /usr/local/bin/docker-compose down --rmi all --volumes

            echo "🔨 Docker 이미지 재빌드 (캐시 없이)..."
            /usr/local/bin/docker-compose build --no-cache --pull

            echo "🚀 Docker 컨테이너 시작..."
            /usr/local/bin/docker-compose up -d --force-recreate

            echo "✅ 자동 배포 완료!"
            echo "🔗 배포 URL: http://leevelop.com:3000"
